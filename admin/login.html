<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staff Login | Harvest Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="login-page">

<div class="login-card">
  <p class="login-brand">Harvest Table</p>
  <p class="login-sub">Staff admin panel</p>

  <div class="login-error" id="login-error">
    Incorrect username or password. Please try again.
  </div>

  <form id="login-form">
    <div class="form-group">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" required />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required />
    </div>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>

  <p class="login-hint">Demo credentials: admin / harvest123</p>
</div>

<script src="../js/data.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (isAdminLoggedIn()) {
      window.location.href = "dashboard.html";
      return;
    }

    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("login-error");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value.trim();

      const success = attemptAdminLogin(username, password);

      if (success) {
        window.location.href = "dashboard.html";
      } else {
        errorBox.classList.add("visible");
      }
    });
  });
</script>

</body>
</html>
